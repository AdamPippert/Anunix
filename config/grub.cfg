# Anunix GRUB boot configuration
#
# Serial + VGA console output for both headless and graphical use.
#

set timeout=3
set default=0

# Serial console (COM1, 115200 baud)
serial --speed=115200 --unit=0
terminal_output serial console
terminal_input serial console

menuentry "Anunix" {
	multiboot /boot/anunix.elf
	boot
}

menuentry "Anunix (serial only)" {
	terminal_output serial
	terminal_input serial
	multiboot /boot/anunix.elf
	boot
}
