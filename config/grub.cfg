# Anunix GRUB boot configuration
#
# Three boot paths:
# 1. Default: multiboot1 (QEMU and BIOS compatible)
# 2. UEFI native: EFI stub loader (real UEFI hardware)
# 3. Serial only: multiboot1 with serial-only output
#

set timeout=3
set default=0

insmod multiboot2
insmod multiboot
insmod chain

# Serial console (COM1, 115200 baud)
serial --speed=115200 --unit=0
terminal_output serial console
terminal_input serial console

menuentry "Anunix" {
	multiboot /boot/anunix-mb1.elf
	boot
}

menuentry "Anunix (UEFI direct)" {
	chainloader /EFI/BOOT/ANUNIX.EFI
}

menuentry "Install Anunix" {
	multiboot /boot/anunix-mb1.elf -- install
	boot
}

menuentry "Anunix (serial only)" {
	terminal_output serial
	terminal_input serial
	multiboot /boot/anunix-mb1.elf
	boot
}
