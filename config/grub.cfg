# Anunix GRUB boot configuration
#
# Default uses multiboot1 (works on QEMU and BIOS).
# "Anunix (UEFI native)" uses multiboot2 with EFI boot services
# for real UEFI hardware where multiboot1's 64→32 transition fails.
#

set timeout=3
set default=0

insmod multiboot2
insmod multiboot

# Serial console (COM1, 115200 baud)
serial --speed=115200 --unit=0
terminal_output serial console
terminal_input serial console

menuentry "Anunix" {
	multiboot /boot/anunix-mb1.elf
	boot
}

menuentry "Anunix (UEFI native)" {
	multiboot2 /boot/anunix.elf
	boot
}

menuentry "Anunix (serial only)" {
	terminal_output serial
	terminal_input serial
	multiboot /boot/anunix-mb1.elf
	boot
}
