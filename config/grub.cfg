# Anunix GRUB boot configuration
#
# Boot paths:
# 1. UEFI (default):  multiboot2 with EFI64 entry — real UEFI hardware
# 2. BIOS/QEMU:       multiboot1 wrapper — legacy BIOS and QEMU
# 3. Install:         UEFI multiboot2 with -- install flag
# 4. Serial only:     BIOS/QEMU path with serial-only console
#

set timeout=5
set default=0

insmod multiboot2
insmod multiboot
insmod chain

# Serial console output also active on UEFI (useful for debugging)
if serial --speed=115200 --unit=0; then
	terminal_output serial console
	terminal_input serial console
fi

# --- UEFI / real hardware (default) ---
# Uses GRUB's native multiboot2 loader: enters _start in 64-bit long mode
# with RAX=multiboot2 magic, RBX=info pointer (includes GOP framebuffer).
menuentry "Anunix" {
	multiboot2 /boot/anunix.elf
	boot
}

# --- BIOS / QEMU ---
# Uses 32-bit multiboot1 wrapper that switches to long mode.
menuentry "Anunix (BIOS/QEMU)" {
	multiboot /boot/anunix-mb1.elf
	boot
}

# --- Install (UEFI) ---
menuentry "Install Anunix" {
	multiboot2 /boot/anunix.elf -- install
	boot
}

# --- Serial-only debug (BIOS/QEMU) ---
menuentry "Anunix (serial only)" {
	terminal_output serial
	terminal_input serial
	multiboot /boot/anunix-mb1.elf
	boot
}

# --- EFI stub (fallback, not recommended) ---
menuentry "Anunix (EFI stub)" {
	chainloader /EFI/BOOT/ANUNIX.EFI
}
