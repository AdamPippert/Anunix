# Anunix GRUB boot configuration
#
# Uses multiboot1 with the 32-bit wrapper for reliable boot on
# both BIOS and UEFI. The wrapper handles 32->64 mode switch
# and identity-maps the first 4 GiB.
#

set timeout=3
set default=0

insmod multiboot

# Serial console (COM1, 115200 baud)
serial --speed=115200 --unit=0
terminal_output serial console
terminal_input serial console

menuentry "Anunix" {
	multiboot /boot/anunix-mb1.elf
	boot
}

menuentry "Anunix (serial only)" {
	terminal_output serial
	terminal_input serial
	multiboot /boot/anunix-mb1.elf
	boot
}
