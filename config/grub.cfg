# Anunix GRUB boot configuration — UEFI / Framework Laptop 16 (jekyll)

set timeout=5
set default=0

# Serial console mirrored to UEFI console (useful for debugging over cable)
if serial --speed=115200 --unit=0; then
	terminal_output serial console
	terminal_input serial console
fi

# UEFI: chainload the EFI stub (GRUB 2.06 multiboot2 EFI64 entry not supported)
# BIOS: use multiboot2 directly with the kernel ELF
if [ "$grub_platform" = "efi" ]; then

	insmod chain

	menuentry "Anunix (WiFi)" {
		chainloader /EFI/BOOT/ANUNIX.EFI
	}

	menuentry "Anunix" {
		chainloader /EFI/BOOT/ANUNIX.EFI
	}

	menuentry "Install Anunix" {
		chainloader /EFI/BOOT/ANUNIX.EFI
	}

else

	insmod multiboot2

	menuentry "Anunix (WiFi)" {
		multiboot2 /boot/anunix.elf cred:wifi-ssid=Ziply-2F00 cred:wifi-pass=rxtn46ghc2wm
		boot
	}

	menuentry "Anunix" {
		multiboot2 /boot/anunix.elf
		boot
	}

	menuentry "Install Anunix" {
		multiboot2 /boot/anunix.elf -- install
		boot
	}

fi
